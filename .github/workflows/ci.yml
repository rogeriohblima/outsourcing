###############################################################################
# .github/workflows/ci.yml — Pipeline de Integração Contínua
#
# Executa em todo push e pull request para as branches main e develop.
#
# Jobs:
#   backend-tests  : lint + testes unitários do Python
#   frontend-build : type-check + lint + build do React
###############################################################################

name: CI — SCI Contratos de Impressoras

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Backend: Testes Python ──────────────────────────────────────────────────
  backend-tests:
    name: Backend — Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Copiar .env de exemplo
        run: cp backend/.env.example backend/.env

      - name: Executar testes com cobertura
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v
        env:
          DATABASE_URL:      sqlite+aiosqlite:///:memory:
          SYNC_DATABASE_URL: sqlite:///:memory:
          SECRET_KEY:        chave-de-teste-ci-nao-usar-em-producao
          APP_ENV:           testing
          AD_SERVER:         127.0.0.1

      - name: Upload cobertura (Codecov)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Frontend: Type-check + Build ────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build e Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: |
          cd frontend
          npm ci

      - name: Copiar .env de exemplo
        run: cp frontend/.env.example frontend/.env

      - name: Type-check TypeScript
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Lint ESLint
        run: |
          cd frontend
          npm run lint
        continue-on-error: true   # Avisos não bloqueiam o CI

      - name: Build de produção
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: http://localhost:8000
