# nginx.conf — Configuracao do Nginx para o container Docker
#
# O Nginx serve o frontend React E faz proxy para o backend FastAPI.
# Dessa forma, o browser acessa tudo pela mesma porta 80,
# evitando problemas de CORS.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressao gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Assets estaticos: cache longo (Vite adiciona hash no nome)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy para a API backend — redireciona /api/* para o container backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Proxy para uploads (documentos PDF)
    location /uploads/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
    }

    # Health check do backend via Nginx
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # SPA React: todas as rotas desconhecidas vao para index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}