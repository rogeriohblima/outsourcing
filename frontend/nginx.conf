# nginx.conf — Configuração do Nginx para a SPA React.
#
# Responsabilidades:
#   1. Serve os arquivos estáticos buildados pelo Vite
#   2. Redireciona todas as rotas desconhecidas para index.html
#      (necessário para o React Router funcionar no modo history)
#   3. Faz proxy reverso das requisições /api/* para o backend FastAPI
#   4. Configura gzip e cache de assets estáticos

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compressão Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ── Assets estáticos: cache longo (Vite adiciona hash ao nome) ──────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Proxy para a API Backend ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;    # SNMP pode demorar
        proxy_connect_timeout 10s;
    }

    # ── Proxy para uploads (documentos PDF) ─────────────────────────────────
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── SPA: todas as rotas → index.html ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health check do Nginx (para load balancers) ──────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
