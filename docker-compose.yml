###############################################################################
# docker-compose.yml — Stack completo do SCI para uso no trabalho
#
# Servicos:
#   postgres  : banco de dados PostgreSQL 16
#   backend   : API FastAPI (porta 8000)
#   frontend  : React + Nginx (porta 80)
#
# Uso rapido:
#   1. Copie .env.docker para .env  (ajuste as variaveis)
#   2. docker compose up --build -d
#   3. Acesse http://localhost
###############################################################################

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sci_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-contrato_impressoras}
      POSTGRES_USER:     ${POSTGRES_USER:-sci_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sci_senha_segura}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sci_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sci_user} -d ${POSTGRES_DB:-contrato_impressoras}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NAO exponha a porta 5432 em producao — acesso apenas interno
    # Descomente abaixo se precisar de acesso externo (ex: DBeaver):
    # ports:
    #   - "5432:5432"

  # ── Backend (FastAPI + Uvicorn) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sci_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Banco de dados
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-sci_user}:${POSTGRES_PASSWORD:-sci_senha_segura}@postgres:5432/${POSTGRES_DB:-contrato_impressoras}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-sci_user}:${POSTGRES_PASSWORD:-sci_senha_segura}@postgres:5432/${POSTGRES_DB:-contrato_impressoras}
      # Seguranca
      SECRET_KEY:        ${SECRET_KEY:-TROQUE_POR_CHAVE_SEGURA_EM_PRODUCAO}
      # Ambiente
      APP_ENV:           ${APP_ENV:-development}
      DEBUG:             ${DEBUG:-true}
      # Active Directory
      AD_SERVER:         ${AD_SERVER:-10.10.10.10}
      AD_PORT:           ${AD_PORT:-389}
      AD_USE_SSL:        ${AD_USE_SSL:-false}
      AD_DOMAIN:         ${AD_DOMAIN:-organizacao.mil.br}
      AD_BASE_DN:        ${AD_BASE_DN:-DC=organizacao,DC=mil,DC=br}
      AD_BIND_USER:      ${AD_BIND_USER:-}
      AD_BIND_PASSWORD:  ${AD_BIND_PASSWORD:-}
      # SNMP
      SNMP_COMMUNITY:    ${SNMP_COMMUNITY:-public}
      SNMP_PORT:         ${SNMP_PORT:-161}
      SNMP_TIMEOUT:      ${SNMP_TIMEOUT:-5}
      # CORS — permite acesso do frontend (Nginx na porta 80)
      CORS_ORIGINS:      '["http://localhost","http://localhost:80","http://127.0.0.1"]'
      UPLOAD_DIR:        /app/uploads
    volumes:
      - uploads_data:/app/uploads
    networks:
      - sci_network
    # Backend nao precisa expor porta para fora — o Nginx faz proxy
    # Descomente se quiser acessar http://localhost:8000/docs diretamente:
    ports:
      - "8000:8000"

  # ── Frontend (React buildado + Nginx) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Durante o build do React, a API e acessada via proxy do Nginx
        # Por isso usamos /api (caminho relativo), nao http://backend:8000
        VITE_API_URL: ""
    container_name: sci_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - sci_network

# ── Volumes persistentes ──────────────────────────────────────────────────────
volumes:
  postgres_data:    # Dados do PostgreSQL — persiste entre restarts
  uploads_data:     # Documentos PDF da comissao — persiste entre restarts

# ── Rede interna ──────────────────────────────────────────────────────────────
networks:
  sci_network:
    driver: bridge