###############################################################################
# docker-compose.yml — Orquestração completa do sistema SCI
#
# Serviços:
#   postgres  : banco de dados PostgreSQL 16
#   backend   : API FastAPI (Uvicorn)
#   frontend  : SPA React servida pelo Nginx
#
# Uso em desenvolvimento:
#   docker compose up --build
#
# Uso em produção:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Variáveis de ambiente: defina no arquivo .env na raiz do projeto.
# Copie de .env.example e ajuste antes de executar.
###############################################################################

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sci_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-contrato_impressoras}
      POSTGRES_USER:     ${POSTGRES_USER:-sci_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sci_senha_segura}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # Expõe localmente para ferramentas como DBeaver
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sci_user} -d ${POSTGRES_DB:-contrato_impressoras}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sci_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-sci_user}:${POSTGRES_PASSWORD:-sci_senha_segura}@postgres:5432/${POSTGRES_DB:-contrato_impressoras}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-sci_user}:${POSTGRES_PASSWORD:-sci_senha_segura}@postgres:5432/${POSTGRES_DB:-contrato_impressoras}
      SECRET_KEY:        ${SECRET_KEY:-TROQUE_EM_PRODUCAO}
      APP_ENV:           ${APP_ENV:-production}
      DEBUG:             ${DEBUG:-false}
      AD_SERVER:         ${AD_SERVER:-10.10.10.10}
      AD_PORT:           ${AD_PORT:-389}
      AD_DOMAIN:         ${AD_DOMAIN:-organizacao.mil.br}
      AD_BASE_DN:        ${AD_BASE_DN:-DC=organizacao,DC=mil,DC=br}
      AD_BIND_USER:      ${AD_BIND_USER:-}
      AD_BIND_PASSWORD:  ${AD_BIND_PASSWORD:-}
      SNMP_COMMUNITY:    ${SNMP_COMMUNITY:-public}
      CORS_ORIGINS:      '["http://localhost", "http://localhost:80"]'
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - sci_network

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:8000
    container_name: sci_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - sci_network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data:

# ── Redes ────────────────────────────────────────────────────────────────────
networks:
  sci_network:
    driver: bridge
