[pytest]
# ── Modo assíncrono padrão ────────────────────────────────────────────────────
asyncio_mode = auto

# ── Diretórios ────────────────────────────────────────────────────────────────
testpaths = tests

# ── Opções padrão ─────────────────────────────────────────────────────────────
addopts =
    --tb=short
    -v
    --strict-markers

# ── Markers customizados ──────────────────────────────────────────────────────
markers =
    unit:        Testes unitários (sem banco de dados)
    integration: Testes de integração (com banco de dados em memória)
    snmp:        Testes relacionados ao serviço SNMP

# Nota: variáveis de ambiente para testes são definidas diretamente
# no conftest.py via os.environ.setdefault() antes de qualquer import da app.
# Isso evita a dependência de pytest-env.
