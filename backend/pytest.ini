[pytest]
# ── Modo assíncrono padrão ────────────────────────────────────────────────────
asyncio_mode = auto

# ── Diretórios de testes ──────────────────────────────────────────────────────
testpaths = tests

# ── Opções padrão ─────────────────────────────────────────────────────────────
addopts =
    --tb=short
    -v
    --strict-markers

# ── Markers customizados ──────────────────────────────────────────────────────
markers =
    unit:        Testes unitários (sem banco de dados)
    integration: Testes de integração (com banco de dados em memória)
    snmp:        Testes relacionados ao serviço SNMP

# ── Variáveis de ambiente para testes ────────────────────────────────────────
# Requer: pip install pytest-env  (adicionar ao requirements.txt se necessário)
env =
    DATABASE_URL=sqlite+aiosqlite:///:memory:
    SYNC_DATABASE_URL=sqlite:///:memory:
    SECRET_KEY=chave-de-teste-nao-usar-em-producao-12345678
    APP_ENV=testing
    DEBUG=false
    AD_SERVER=127.0.0.1
    AD_PORT=389
    AD_DOMAIN=teste.local
    AD_BASE_DN=DC=teste,DC=local
    SNMP_COMMUNITY=public
    SNMP_TIMEOUT=1
    UPLOAD_DIR=/tmp/sci_test_uploads
